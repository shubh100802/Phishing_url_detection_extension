<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUDRAKSHA: The Saviour</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 12px; width: 360px; background: #0b1220; color: #e2e8f0; }
    .brand { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    .sub { font-size: 11px; color: #93c5fd; letter-spacing: .08em; margin-bottom: 10px; }
    .card { border: 1px solid #1f2a44; border-radius: 10px; padding: 10px; margin-bottom: 10px; background: #0f172a; }
    .row { margin-bottom: 8px; }
    input, button, select { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #111827; color: #e2e8f0; }
    button { background: #2563eb; border: 0; color: white; font-weight: 700; cursor: pointer; }
    button.alt { background: #475569; }
    button.good { background: #16a34a; }
    button.warn { background: #d97706; }
    .small { font-size: 12px; color: #94a3b8; }
    .status { margin-top: 8px; padding: 8px; border-radius: 6px; font-size: 12px; background: #1f2937; white-space: pre-line; }
    .safe { color: #22c55e; }
    .suspicious { color: #f59e0b; }
    .malicious { color: #ef4444; }
    .tabs { display:flex; gap:6px; margin-bottom:8px; }
    .tabs button { flex:1; padding:6px; font-size:12px; }
    .hidden { display:none; }
    ul { margin: 6px 0 0 14px; padding: 0; }
    li { margin-bottom: 4px; font-size: 12px; color: #cbd5e1; }
    .section-title { font-size: 13px; font-weight: 700; margin: 0 0 8px 0; }
  </style>
</head>
<body>
  <div class="brand">RUDRAKSHA: The Saviour Scanner</div>
  <div class="sub">RUDRAKSHA: THE SAVIOUR SECURITY</div>

  <div class="card">
    <div class="row"><input id="urlInput" type="text" placeholder="https://example.com" /></div>
    <div class="row small"><label><input id="deepScan" type="checkbox" style="width:auto;margin-right:6px;" />Deep scan</label></div>
    <div class="row"><button id="scanBtn">Scan Current URL</button></div>
    <div id="result" class="status">No scan yet.</div>
  </div>

  <div class="card">
    <div class="section-title">Optional Account</div>
    <div id="authLoggedOut">
      <div class="tabs">
        <button id="showLoginBtn" class="good">Login</button>
        <button id="showSignupBtn" class="alt">Signup</button>
      </div>
      <div id="loginPanel">
        <div class="row"><input id="loginEmail" type="email" placeholder="Email" /></div>
        <div class="row"><input id="loginPassword" type="password" placeholder="Password" /></div>
        <div class="row"><button id="loginBtn">Login</button></div>
      </div>
      <div id="signupPanel" class="hidden">
        <div class="row"><input id="signupName" type="text" placeholder="Full name" /></div>
        <div class="row"><input id="signupEmail" type="email" placeholder="Email" /></div>
        <div class="row"><input id="signupPassword" type="password" placeholder="Password (min 6)" /></div>
        <div class="row"><button id="signupBtn" class="warn">Create Account</button></div>
      </div>
    </div>
    <div id="authLoggedIn" class="hidden">
      <div id="whoami" class="small"></div>
      <div class="row" style="margin-top:8px;"><button id="logoutBtn" class="alt">Logout</button></div>
    </div>
    <div id="authMsg" class="small"></div>
  </div>

  <div class="card">
    <div class="section-title">Recent History (Logged in)</div>
    <button id="refreshHistoryBtn" class="alt">Refresh History</button>
    <ul id="historyList"><li class="small">Login to view your recent scans.</li></ul>
  </div>

  <div class="small">Backend: /api/scan/public (or /api/scan when logged in)</div>
  <script src="popup.js"></script>
</body>
</html>
