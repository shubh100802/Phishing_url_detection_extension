<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUDRAKSHA</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 12px; width: 320px; background: #0f172a; color: #e2e8f0; }
    h1 { margin: 0 0 10px; font-size: 16px; }
    .row { margin-bottom: 10px; }
    input[type="text"] { width: 100%; padding: 8px; border: 1px solid #334155; border-radius: 6px; background: #111827; color: #e2e8f0; }
    label { font-size: 12px; display: flex; align-items: center; gap: 8px; }
    button { width: 100%; border: 0; border-radius: 6px; padding: 10px; cursor: pointer; background: #2563eb; color: white; font-weight: bold; }
    button:disabled { opacity: 0.7; cursor: wait; }
    .status { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 12px; background: #1f2937; }
    .safe { color: #22c55e; }
    .suspicious { color: #f59e0b; }
    .malicious { color: #ef4444; }
    .muted { color: #94a3b8; font-size: 11px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>RUDRAKSHA Scanner</h1>
  <div class="row">
    <input id="urlInput" type="text" placeholder="https://example.com" />
  </div>
  <div class="row">
    <label><input id="deepScan" type="checkbox" /> Deep scan</label>
  </div>
  <div class="row">
    <button id="scanBtn">Scan Current URL</button>
  </div>
  <div id="result" class="status">No scan yet.</div>
  <div class="muted">Uses backend: /api/scan/public (localhost:3001 then 3000)</div>
  <script src="popup.js"></script>
</body>
</html>
